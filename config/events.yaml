# Scheduled market events that move oil. Edit these as the calendar updates — the weekly
# EIA / rig-count releases are computed automatically; these are the one-off dates.
# `datetime` is ISO 8601 (UTC if it ends in Z). Past events are ignored automatically.
events:
  - name: OPEC+ meeting
    datetime: 2026-07-06T12:00:00Z
    category: energy
  - name: US CPI (inflation)
    datetime: 2026-07-15T12:30:00Z
    category: macro
  - name: FOMC rate decision
    datetime: 2026-07-29T18:00:00Z
    category: macro
  - name: IEA Oil Market Report
    datetime: 2026-07-11T08:00:00Z
    category: energy
