  # --- Social / political signal ---
  # Trump's Truth Social posts via the trumpstruth.org public archive feed
  # (the direct truthsocial.com API is Cloudflare-blocked; this RSS mirror is not).
  - id: truth-social-trump
    name: Truth Social (Trump)
