name: Ingest news → Turso

# The "living" engine: pulls fresh headlines into the cloud database on a schedule,
# so the deployed dashboard stays current even when nobody is looking at it.
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (public repo = unlimited free Actions minutes).
  workflow_dispatch: {}      # manual "Run workflow" button

# Avoid overlapping runs if one is slow.
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies (lean — ingest only)
        run: pip install -r requirements-ingest.txt
      - name: Fetch feeds into Turso + prune old rows
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python tools/fetch_rss.py --quiet --prune-days 14
