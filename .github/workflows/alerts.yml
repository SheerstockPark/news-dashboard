name: Urgent headline alerts → Neil

# Intra-day watchdog: every 15 min it checks the freshly-ingested headlines and emails Neil
# only the *very big* ones (high relevance, strong impact, or a shock keyword — cross-asset,
# not oil-only). Dedupe lives in the Turso DB so each story emails at most once. The first
# run on a fresh DB baselines the backlog silently (no blast).
on:
  # Schedule disabled — the always-on Railway worker (tools/worker.py) now checks urgent
  # headlines every ~60s (genuinely instant vs this 15-min cron). Urgent dedupe is per-article in
  # Turso, so both running wouldn't double-send, but there's no need to run both. Manual runs
  # still work via "Run workflow". Re-enable this cron only if the worker is retired.
  # schedule:
  #   - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: urgent-alerts
  cancel-in-progress: false

jobs:
  alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-brief.txt
      - name: Email very-big headlines
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python tools/run_alerts.py --urgent
